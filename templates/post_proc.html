{% from "macros.html" import back_button %}
<!-- Global Back Button -->
<div class="row">
	{{ back_button("home") }}
</div>

<div class="row">
	&nbsp;
</div>

<div class="row">
    <div class="col">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <strong>
                    Post-Processing Stream: 
                    <span id="postProcWorking" style="color:yellow">
                        <i>&nbsp;Working&nbsp;</i>
                        <div class="spinner-border spinner-border-sm" role="status">
                            <span class="visually-hidden">...</span>
                        </div>  
                    </span>
                    <span id="postProcDone" style="display: none; color:#33ff00;">
                        <i>&nbsp;Done&nbsp;</i>
                        <i class="fa-regular fa-thumbs-up"></i>
                    </span>
                </strong>
            </div>
            <div class="card-body">
                <style>
                    #outputPostProc {
                        white-space: pre;
                        font-family: monospace;
                        background: #000000;
                        padding: 1em;
                        border: 1px solid #585858;
                        height: 600px;
                        overflow-y: auto;
                        color: #33ff00
                    }
                </style>
                <div id="outputPostProc"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const outputPostProc = document.getElementById('outputPostProc');
    let eventSourcePostProc = null;
    
    // Start checking process status immediately and then periodically
    checkRunningProcesses();
    
    function startPostProcessScript() {
        outputPostProc.textContent += '\n+++ Calling API +++\n';
        
        const paramsPostProc = new URLSearchParams({
            script_arg: 'postprocess'
        });
        
        eventSourcePostProc = new EventSource(`/stream?${paramsPostProc.toString()}`);
        
        eventSourcePostProc.onmessage = function(e) {
            // Parse the JSON-encoded data and append it
            const text = JSON.parse(e.data);
            outputPostProc.textContent += text;
            outputPostProc.scrollTop = outputPostProc.scrollHeight;
            
            // Check process status to update UI
            checkRunningProcesses();
        };
        
        eventSourcePostProc.onerror = function(e) {
            outputPostProc.textContent += '\nConnection closed\n';
            eventSourcePostProc.close();
            
            // Update the UI
            checkRunningProcesses();
            
            // Final check after a delay to ensure all updates are processed
            setTimeout(checkRunningProcesses, 1000);
        };
    }
    
    // Check if postprocess is already running
    fetch('/check_running_processes')
        .then(response => response.json())
        .then(data => {
            if (data.postprocess_running) {
                outputPostProc.textContent = "Post-process script is already running. Connecting to output stream...\n";
                $('#postProcWorking').show();
                $('#postProcDone').hide();
            } else {
                startPostProcessScript();
            }
        })
        .catch(error => {
            console.error('Error checking process status:', error);
            startPostProcessScript();
        });
    
    // Poll for status updates every 3 seconds
    const statusInterval = setInterval(checkRunningProcesses, 3000);
    
    // Clean up when leaving the page
    window.addEventListener('beforeunload', function() {
        clearInterval(statusInterval);
        if (eventSourcePostProc) {
            eventSourcePostProc.close();
        }
    });
</script>
